<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Cumulo Horcrux architecture — 2-of-3 threshold signing</title>
<desc>Diagrama de arquitectura Horcrux mostrando tres sentries conectados a un cluster de tres cosigners via red privada, con threshold 2-of-3</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: monospace, sans-serif; fill: #FEFAE0; }
    .label-sm { font-size: 11px; fill: #A86A24; }
    .label-md { font-size: 13px; font-weight: 600; fill: #FEFAE0; }
    .label-dim { font-size: 11px; fill: #606C37; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="420" fill="#060502"/>

<!-- Internet label -->
<text class="label-dim" x="340" y="24" text-anchor="middle">Internet / P2P network</text>
<line x1="80" y1="32" x2="600" y2="32" stroke="#321A0C" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Sentry nodes -->
<rect x="60" y="50" width="120" height="52" rx="8" fill="#1a3a30" stroke="#2a6b55" stroke-width="0.5"/>
<text class="label-md" x="120" y="72" text-anchor="middle" dominant-baseline="central">Sentry 1</text>
<text class="label-sm" x="120" y="90" text-anchor="middle" dominant-baseline="central">:26656</text>

<rect x="280" y="50" width="120" height="52" rx="8" fill="#1a3a30" stroke="#2a6b55" stroke-width="0.5"/>
<text class="label-md" x="340" y="72" text-anchor="middle" dominant-baseline="central">Sentry 2</text>
<text class="label-sm" x="340" y="90" text-anchor="middle" dominant-baseline="central">:26656</text>

<rect x="500" y="50" width="120" height="52" rx="8" fill="#1a3a30" stroke="#2a6b55" stroke-width="0.5"/>
<text class="label-md" x="560" y="72" text-anchor="middle" dominant-baseline="central">Sentry 3</text>
<text class="label-sm" x="560" y="90" text-anchor="middle" dominant-baseline="central">:26656</text>

<!-- Private network label -->
<text class="label-dim" x="340" y="150" text-anchor="middle">private network · priv_validator_laddr :1234</text>
<line x1="80" y1="158" x2="600" y2="158" stroke="#321A0C" stroke-width="0.5" stroke-dasharray="2 4"/>

<!-- Arrows sentry → private net -->
<line x1="120" y1="102" x2="120" y2="154" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="102" x2="340" y2="154" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="560" y1="102" x2="560" y2="154" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Cosigner nodes -->
<rect x="60" y="180" width="160" height="64" rx="8" fill="#2a1a06" stroke="#FFA500" stroke-width="0.8"/>
<text class="label-md" x="140" y="204" text-anchor="middle" dominant-baseline="central">Cosigner 1</text>
<text class="label-sm" x="140" y="224" text-anchor="middle" dominant-baseline="central">shard #1 · :2222</text>

<rect x="260" y="180" width="160" height="64" rx="8" fill="#2a1a06" stroke="#FFA500" stroke-width="0.8"/>
<text class="label-md" x="340" y="204" text-anchor="middle" dominant-baseline="central">Cosigner 2</text>
<text class="label-sm" x="340" y="224" text-anchor="middle" dominant-baseline="central">shard #2 · :2222</text>

<rect x="460" y="180" width="160" height="64" rx="8" fill="#2a1a06" stroke="#FFA500" stroke-width="0.8"/>
<text class="label-md" x="540" y="204" text-anchor="middle" dominant-baseline="central">Cosigner 3</text>
<text class="label-sm" x="540" y="224" text-anchor="middle" dominant-baseline="central">shard #3 · :2222</text>

<!-- Raft connections between cosigners -->
<line x1="220" y1="212" x2="260" y2="212" stroke="#A86A24" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="420" y1="212" x2="460" y2="212" stroke="#A86A24" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Raft label -->
<text class="label-dim" x="340" y="266" text-anchor="middle">Raft consensus · ECIES encrypted · :2222</text>

<!-- Threshold box -->
<rect x="180" y="296" width="320" height="52" rx="8" fill="none" stroke="#FFA500" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.4"/>
<text class="label-md" x="340" y="318" text-anchor="middle" dominant-baseline="central">2-of-3 threshold signing</text>
<text class="label-sm" x="340" y="336" text-anchor="middle" dominant-baseline="central">Ed25519 shards · Shamir's Secret Sharing</text>

<!-- Arrows cosigners → threshold -->
<line x1="140" y1="244" x2="250" y2="294" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="244" x2="340" y2="294" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="540" y1="244" x2="430" y2="294" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Validator -->
<rect x="260" y="368" width="160" height="44" rx="8" fill="#1a1209" stroke="#606C37" stroke-width="0.5"/>
<text class="label-md" x="340" y="386" text-anchor="middle" dominant-baseline="central">Validator</text>
<text class="label-sm" x="340" y="402" text-anchor="middle" dominant-baseline="central">signed precommit</text>

<line x1="340" y1="348" x2="340" y2="366" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>

</svg>
