<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Shard generation and distribution flow</title>
<desc>Flujo de generación de shards Ed25519 desde una máquina segura hacia tres cosigners</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: monospace, sans-serif; fill: #FEFAE0; }
    .label-sm { font-size: 11px; fill: #A86A24; }
    .label-md { font-size: 13px; font-weight: 600; fill: #FEFAE0; }
    .label-warn { font-size: 11px; fill: #E85D24; }
    .label-dim { font-size: 11px; fill: #606C37; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="360" fill="#060502"/>

<!-- Step 1: priv_validator_key.json -->
<rect x="200" y="20" width="280" height="52" rx="8" fill="#1a1209" stroke="#606C37" stroke-width="0.5"/>
<text class="label-md" x="340" y="42" text-anchor="middle" dominant-baseline="central">priv_validator_key.json</text>
<text class="label-sm" x="340" y="60" text-anchor="middle" dominant-baseline="central">validator private key</text>

<!-- Arrow down -->
<line x1="340" y1="72" x2="340" y2="104" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Step 2: Secure machine -->
<rect x="160" y="108" width="360" height="64" rx="8" fill="#2a1208" stroke="#E85D24" stroke-width="0.8"/>
<text class="label-md" x="340" y="132" text-anchor="middle" dominant-baseline="central">Secure machine</text>
<text class="label-sm" x="340" y="152" text-anchor="middle" dominant-baseline="central">horcrux create-ed25519-shards --threshold 2 --shards 3</text>

<!-- Warning note -->
<text class="label-warn" x="340" y="192" text-anchor="middle">⚠ delete key from this machine immediately after</text>

<!-- Three arrows down to cosigners -->
<line x1="240" y1="172" x2="120" y2="234" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="172" x2="340" y2="234" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="440" y1="172" x2="560" y2="234" stroke="#606C37" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Shard labels -->
<text class="label-sm" x="155" y="214" text-anchor="middle">shard #1</text>
<text class="label-sm" x="340" y="214" text-anchor="middle">shard #2</text>
<text class="label-sm" x="525" y="214" text-anchor="middle">shard #3</text>

<!-- Cosigner nodes -->
<rect x="40" y="238" width="160" height="64" rx="8" fill="#2a1a06" stroke="#FFA500" stroke-width="0.8"/>
<text class="label-md" x="120" y="262" text-anchor="middle" dominant-baseline="central">Cosigner 1</text>
<text class="label-sm" x="120" y="280" text-anchor="middle" dominant-baseline="central">~/.horcrux/ shard #1</text>

<rect x="260" y="238" width="160" height="64" rx="8" fill="#2a1a06" stroke="#FFA500" stroke-width="0.8"/>
<text class="label-md" x="340" y="262" text-anchor="middle" dominant-baseline="central">Cosigner 2</text>
<text class="label-sm" x="340" y="280" text-anchor="middle" dominant-baseline="central">~/.horcrux/ shard #2</text>

<rect x="480" y="238" width="160" height="64" rx="8" fill="#2a1a06" stroke="#FFA500" stroke-width="0.8"/>
<text class="label-md" x="560" y="262" text-anchor="middle" dominant-baseline="central">Cosigner 3</text>
<text class="label-sm" x="560" y="280" text-anchor="middle" dominant-baseline="central">~/.horcrux/ shard #3</text>

<!-- Bottom labels -->
<text class="label-dim" x="340" y="328" text-anchor="middle">each cosigner holds one shard · no single node can sign alone</text>
<text class="label-dim" x="340" y="346" text-anchor="middle">2-of-3 required to produce a valid signature</text>

</svg>
